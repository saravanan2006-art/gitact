<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Booking System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#141e30,#243b55);
    min-height:100vh;
    color:white;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

header{
    text-align:center;
    padding:20px;
}

header h1{
    font-size:40px;
    color:#ffcc00;
}

.movie-card{
    display:flex;
    flex-wrap:wrap;
    background:white;
    color:black;
    border-radius:15px;
    overflow:hidden;
    margin-top:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.poster{
    flex:1;
    min-width:300px;
}

.poster img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.details{
    flex:2;
    padding:25px;
}

.details h2{
    color:#243b55;
    margin-bottom:10px;
}

.details p{
    margin-bottom:15px;
}

.booking-section{
    margin-top:20px;
}

select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

.screen{
    background:white;
    color:black;
    text-align:center;
    margin:25px auto;
    padding:10px;
    width:60%;
    border-radius:5px;
    font-weight:bold;
}

.seats{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:10px;
    margin-top:20px;
}

.seat{
    height:40px;
    background:#4caf50;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.seat:hover{
    transform:scale(1.1);
}

.seat.selected{
    background:#ff9800;
}

.seat.booked{
    background:#f44336;
    cursor:not-allowed;
}

.summary{
    margin-top:25px;
    text-align:center;
}

button{
    background:#ffcc00;
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#ffd633;
}

.footer{
    text-align:center;
    margin-top:30px;
    padding:20px;
}
</style>
</head>
<body>

<div class="container">

<header>
    <h1>🎬 Movie Booking System</h1>
</header>

<div class="movie-card">

    <div class="poster">
        <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=800" alt="Movie Poster">
    </div>

    <div class="details">

        <h2>Avengers: Endgame</h2>

        <p>
            The Avengers assemble once again to reverse the actions of Thanos
            and restore balance to the universe.
        </p>

        <div class="booking-section">
            <label>Select Show Time</label>

            <select>
                <option>10:00 AM</option>
                <option>1:00 PM</option>
                <option>4:00 PM</option>
                <option>7:00 PM</option>
                <option>10:00 PM</option>
            </select>

            <div class="screen">
                SCREEN
            </div>

            <div class="seats" id="seatContainer">
                <!-- Seats Generated by JS -->
            </div>

            <div class="summary">
                <h3>
                    Selected Seats:
                    <span id="count">0</span>
                </h3>

                <h3>
                    Total Price:
                    ₹<span id="total">0</span>
                </h3>

                <button>Book Now</button>
            </div>

        </div>

    </div>

</div>

<div class="footer">
    © 2026 Movie Booking System
</div>

</div>

<script>
const seatContainer = document.getElementById("seatContainer");
const count = document.getElementById("count");
const total = document.getElementById("total");

const seatPrice = 200;

// Create 40 seats
for(let i=1;i<=40;i++){

    const seat = document.createElement("div");
    seat.classList.add("seat");

    // Random booked seats
    if(Math.random() < 0.15){
        seat.classList.add("booked");
    }

    seatContainer.appendChild(seat);

    seat.addEventListener("click",()=>{

        if(seat.classList.contains("booked")) return;

        seat.classList.toggle("selected");

        const selectedSeats =
            document.querySelectorAll(".seat.selected");

        count.innerText = selectedSeats.length;
        total.innerText =
            selectedSeats.length * seatPrice;
    });
}
</script>

</body>
</html>
