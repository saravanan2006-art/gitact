name: Movie Booking CI/CD

on:
  push:
    branches:
      - main

jobs:

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/movie-booking:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/movie-booking:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Deploy Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/movie-booking:latest

            docker stop movie-booking || true
            docker rm movie-booking || true

            docker run -d \
              --name movie-booking \
              --restart always \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/movie-booking:latest

            docker image prune -f
